# straitjacket-allow-file[:duplication] — the checkout/toolchain/canvas setup
# necessarily mirrors conformance.yml (and ci.yml); Actions YAML has no include
# mechanism for it. Keep this setup block in lockstep with conformance.yml.
#
# Auto-refresh of the committed conformance baseline (conformance.json) — option (c).
#
# WHY THIS EXISTS
#   The repo commits conformance.json as the baseline that per-PR conformance
#   runs diff against. Left to hand-maintenance that file drifts stale, and a
#   stale baseline makes every PR delta noisy — a PR appears to move numbers it
#   never touched. This job keeps the baseline current by regenerating it the
#   same way CI does and committing the fresh result back to the PR's own branch.
#
# WHERE THE BASELINE MOVES — PER-PR, ON THE PR'S OWN HEAD BRANCH
#   This job runs on every PR (opened/synchronize/reopened) and commits the
#   regenerated conformance.json to the PR's HEAD branch — never to main. Each PR
#   therefore carries a baseline that already reflects that PR's changes, so the
#   sticky per-PR delta reads against an up-to-date file. Because the write lands
#   on the PR branch (not protected main), the default GITHUB_TOKEN's normal
#   contents:write is sufficient and NO branch-protection bypass is needed.
#
# LOOP TERMINATION — BOUNDED BY DETERMINISM (#85)
#   Committing to the PR branch pushes a new HEAD, which DOES re-trigger the PR
#   workflows — and that is intentional: the required checks must re-run on the
#   new HEAD so the PR stays mergeable. The loop is bounded to exactly one extra
#   run because the baseline is byte-deterministic (creds-strip is baked into
#   scripts/conformance.sh, #85): the re-triggered run regenerates an identical
#   conformance.json, `git diff` is empty, no second commit is made, and the loop
#   stops. We deliberately do NOT use [skip ci] on the commit — skipping CI would
#   leave the required checks un-run on the new HEAD and block merge.
#
# FORKS ARE SKIPPED
#   A PR from a fork gets a read-only GITHUB_TOKEN and cannot push to its head
#   repo, so the same-repo guard below skips fork PRs entirely rather than fail.

name: conformance-baseline

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Least privilege plus the one extra the job needs: write access to commit the
# refreshed baseline back to the PR's own head branch (not main — so no
# protected-branch bypass is required).
permissions:
  contents: write

# One in-flight refresh per PR; cancel superseded runs so only the newest HEAD's
# regen survives.
concurrency:
  group: conformance-baseline-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  refresh-baseline:
    name: refresh conformance baseline for this PR
    # Same-repo PRs only. Fork PRs get a read-only token and cannot push to their
    # head branch, so skip them rather than fail on the push.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      # Check out the PR HEAD branch with write-capable credentials so the
      # commit-back push targets the branch this PR is built from. persist-
      # credentials keeps the token wired to the local git config for that push.
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          submodules: recursive  # vendor/pi must be present for codegen + tests
          persist-credentials: true
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v7
        with:
          node-version: "22"  # matches pi engines (>=22.19)

      # --- napi addon ----------------------------------------------------
      # The native shims delegate to this addon, so it must be current before
      # the conformance run materializes the module tree. Mirrors conformance.yml.
      - name: Build atilla-napi crate
        run: cargo build -p atilla-napi

      - name: Build + load napi addon
        working-directory: crates/atilla-napi
        run: |
          npm install
          npx napi build --platform
          node -e "const { atillaNativeVersion } = require('./index.js'); const v = atillaNativeVersion(); if (typeof v !== 'string' || v.length === 0) { throw new Error('atillaNativeVersion() returned ' + JSON.stringify(v)); } console.log('atillaNativeVersion() =>', v);"

      # System libs for canvas (a packages/ai devDependency pulled in by the
      # workspace install). Present before the setup step's npm install. Mirrors
      # conformance.yml.
      - name: Install canvas system libs
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev
        continue-on-error: true

      # Regenerate the full five-package baseline exactly as CI does (--setup does
      # the pi npm install + ai model codegen). scripts/conformance.sh strips
      # AWS/Anthropic creds itself (#85) so packages/ai stays on the offline
      # profile and the baseline is byte-deterministic — no manual `env -u` here.
      - name: Regenerate conformance baseline
        run: scripts/conformance.sh --setup

      # Commit the refreshed baseline back to the PR's HEAD branch — but only on
      # genuine drift. NO [skip ci]: the push must re-trigger the required checks
      # on the new HEAD so the PR stays mergeable. Determinism (#85) bounds this
      # to one extra run — the re-triggered regen produces an identical file, the
      # diff is empty, no further commit is made, and the loop terminates.
      - name: Commit refreshed baseline to PR branch if it drifted
        run: |
          if git diff --quiet -- conformance.json; then
            echo "conformance.json unchanged — baseline already current for this PR, nothing to commit."
          else
            echo "conformance.json drifted — committing refreshed baseline to the PR branch."
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add conformance.json
            git commit -m "ci(conformance): refresh baseline for this PR"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi
