# straitjacket-allow-file[:duplication] — the checkout/toolchain/cache setup
# necessarily mirrors ci.yml; Actions YAML has no include mechanism for it.
#
# Conformance workflow. Two responsibilities, deliberately split by severity:
#
#   1. napi build GATE (fails the job): the atilla-napi cdylib must compile and
#      the resulting addon must load in Node and answer atillaNativeVersion().
#      A broken addon is a real regression, so this step is allowed to go red.
#
#   2. conformance runner (NON-gating): runs the vendored pi suites against the
#      codegen-materialized module tree and records a baseline. pi-test failures
#      and network flakiness must NOT turn the PR red — the regression gate comes
#      later, once a trusted baseline exists. Hence continue-on-error on the
#      pi-setup and test-run steps.
#
# Smoke-subset choice (per-PR): we run `agent`, `ai`, and `tui`. agent and tui
# are fully green and fast (~4s / ~11s); ai runs offline in ~35s (562 pass /
# 24 fail / 708 provider-key-gated skips) and is included so the native flips
# landing in packages/ai — starting with the Anthropic SSE parser — are actually
# exercised and show up in the sticky comment's per-package native count. The
# run needs the full monorepo `npm install` (canvas builds against system libs)
# plus the generated ai model-catalog (`npm run generate-models`); both are done
# by `scripts/conformance.sh --setup`. We still skip coding-agent's flaky
# sandbox-sensitive suite (extensions discovery/runner, fswatch, stdout
# cleanliness). The full five-package suite runs on the weekly cron with
# --setup, not on every PR. agent/tui do not import canvas themselves, but the
# shared workspace install does, so we install the canvas system libs and let
# the setup step continue-on-error rather than trying to prune the install.

name: conformance

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"  # weekly (Mon 06:00 UTC): full five-package suite
  workflow_dispatch:

jobs:
  conformance:
    name: napi build + conformance smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      pull-requests: write  # sticky conformance comment on PRs
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive  # vendor/pi must be present for codegen + tests

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "22"  # matches pi engines (>=22.19)

      # --- napi build GATE (allowed to fail the job) ---------------------
      - name: Build atilla-napi crate
        run: cargo build -p atilla-napi

      - name: Build + load napi addon
        working-directory: crates/atilla-napi
        run: |
          npm install
          npx napi build --platform
          node -e "const { atillaNativeVersion } = require('./index.js'); const v = atillaNativeVersion(); if (typeof v !== 'string' || v.length === 0) { throw new Error('atillaNativeVersion() returned ' + JSON.stringify(v)); } console.log('atillaNativeVersion() =>', v);"

      # --- conformance smoke (NON-gating) --------------------------------
      # System libs for canvas (a packages/ai devDependency pulled in by the
      # workspace install). The ai smoke package builds canvas, so these must be
      # present before the setup step's npm install. Ubuntu runner, apt available.
      - name: Install canvas system libs
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev
        continue-on-error: true

      # Snapshot the committed baseline before the run overwrites conformance.json,
      # so the PR comment can diff the fresh smoke results against it like-for-like.
      - name: Snapshot committed conformance baseline
        if: github.event_name == 'pull_request'
        run: cp conformance.json "$RUNNER_TEMP/conformance-baseline.json"

      - name: Conformance smoke (agent + ai + tui)
        run: CONFORMANCE_PACKAGES="agent ai tui" scripts/conformance.sh --setup
        continue-on-error: true

      # Render the sticky-comment body: fresh agent+ai+tui totals plus the
      # passing/failing delta versus the committed baseline snapshot taken above.
      - name: Build conformance PR comment
        if: always() && github.event_name == 'pull_request'
        run: node conformance/pr-comment.mjs conformance.json "$RUNNER_TEMP/conformance-baseline.json" > "$RUNNER_TEMP/conformance-comment.md"
        continue-on-error: true

      # Non-gating: post/update one sticky comment per PR. Fork PRs get a
      # read-only token and cannot comment, so degrade gracefully.
      - name: Post conformance sticky comment
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        continue-on-error: true
        with:
          header: conformance
          path: ${{ runner.temp }}/conformance-comment.md

      - name: Upload conformance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-results
          path: |
            conformance.json
            conformance/.out
          if-no-files-found: warn
