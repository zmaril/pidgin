name: housekeeping
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 7 * * 1"  # weekly drift check: website rot, stale PRs, settings flips
  workflow_dispatch:  # the captain's "now" button

jobs:
  housekeeping:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: zmaril/housekeeping@v0.19.0
