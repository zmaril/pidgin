name: pidgin-extensions

# The pidgin-extensions crate gates deno_core (and therefore V8) behind the
# non-default `deno` feature, so the shared workspace CI never builds V8. This
# dedicated job is the ONLY place the real runtime is compiled and tested, and
# thus the sole V8-in-CI probe. Path-filtered so it only runs when the crate,
# the vendored examples its tests load, or this workflow changes.
on:
  push:
    branches: [main]
    paths:
      - "crates/pidgin-extensions/**"
      - "crates/pidgin-cli/**"
      - "examples/**"
      - ".github/workflows/pidgin-extensions.yml"
  pull_request:
    paths:
      - "crates/pidgin-extensions/**"
      - "crates/pidgin-cli/**"
      - "examples/**"
      - ".github/workflows/pidgin-extensions.yml"

jobs:
  deno:
    name: deno runtime (V8)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # deno_core embeds V8; its prebuilt static blob (~38 MB) downloads from
      # GitHub release assets on first build. GitHub Actions runners have open
      # egress, so the download succeeds here even though it 403s in the sandbox.
      - run: cargo build -p pidgin-extensions --features deno
      - run: cargo clippy -p pidgin-extensions --features deno --all-targets -- -D warnings
      - run: cargo test -p pidgin-extensions --features deno
      # The `deno` feature on pidgin-cli wires the real JS extension loader into
      # `pidgin -e ./ext.ts`. It transitively pulls the same V8 blob, so this is
      # the only place the feature-gated CLI code is compiled and its
      # deno-gated tests (which really load an extension on the V8 plane) run.
      - run: cargo build -p pidgin-cli --features deno
      - run: cargo test -p pidgin-cli --features deno
      # The COMBINED (deno + python) extension loader: this V8 job is the only
      # place the `deno,python` build compiles, since it needs the V8 blob. It
      # exercises the combined loader/runner over BOTH engines and the combined
      # CLI wiring. (The python-only slice is additionally verified offline.)
      - run: cargo build -p pidgin-extensions --features deno,python
      - run: cargo test -p pidgin-extensions --features deno,python
      - run: cargo build -p pidgin-cli --features deno,python
      - run: cargo test -p pidgin-cli --features deno,python

  python:
    name: python engine (PyO3)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # PyO3's `auto-initialize` EMBEDS CPython: it links libpython and inits the
      # interpreter on first `Python::with_gil`. Unlike V8 there is no blob to
      # download — the runner's system libpython is enough — so, unlike the deno
      # job, this engine builds and tests offline in every sandbox too.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: cargo build -p pidgin-extensions --features python
      - run: cargo clippy -p pidgin-extensions --features python --all-targets -- -D warnings
      - run: cargo test -p pidgin-extensions --features python
      # The python-only slice of the combined CLI wiring: `pidgin -e ./ext.py`
      # reaches the real combined loader (its python inner live), NOT the
      # engine-free notice. Builds/tests offline since libpython needs no blob.
      - run: cargo build -p pidgin-cli --features python
      - run: cargo test -p pidgin-cli --features python
