fleet = "zmaril/powderworks"

[checks]
# No dedicated website yet — the repo is the product.
website = "off"
# Adopted on enrollment; the fleet default is "recommended".
conventional-commits = "required"

[scripts]
# test.sh is bindings/php's build + load + version harness; it must sit next to
# the crate it drives (a standalone workspace), not under the repo-wide scripts/.
allow = ["bindings/php/test.sh"]

[stray-todos]
# The M1 Session::open marker in the PHP binding is a deliberate, milestone-
# tagged placeholder for the next binding surface, not untracked work.
# The fluessig integration note quotes that same `// TODO(M1)` marker as prose
# when describing what atilla exposes today — a reference, not untracked work.
ignore = ["bindings/php/src/lib.rs", "notes/fluessig-integration.md"]
