fleet = "zmaril/powderworks"

[checks]
# No dedicated website yet — the repo is the product.
website = "off"
# Adopted on enrollment; the fleet default is "recommended".
conventional-commits = "required"

[scripts]
# test.sh is bindings/php's build + load + version harness; it must sit next to
# the crate it drives (a standalone workspace), not under the repo-wide scripts/.
# gen_eaw_table.sh is a vector-generator that lives beside its sibling .mjs
# generators for the atilla-tui bit-exact port, not under the repo-wide scripts/.
allow = [
    "bindings/php/test.sh",
    "crates/atilla-tui/vectors/gen/gen_eaw_table.sh",
]

[stray-todos]
# The M1 Session::open marker in the PHP binding is a deliberate, milestone-
# tagged placeholder for the next binding surface, not untracked work.
# The fluessig integration note quotes that same M1 placeholder marker as prose
# when describing what atilla exposes today — a reference, not untracked work.
# `flow.rs` carries a single `TODO(seam-wiring PR #63)` marker: a tracked
# cross-PR handoff to drop the local serde-mirror structs once seam-wiring's
# HttpRequest/HttpResponse serde derives land on main — tracked work, not
# untracked.
ignore = [
    "bindings/php/src/lib.rs",
    "notes/fluessig-integration.md",
    "crates/atilla-ai/src/auth/oauth/flow.rs",
]
